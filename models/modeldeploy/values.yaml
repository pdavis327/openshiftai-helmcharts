# Required: set these for your model and target cluster
modelname: my-model                  # Name of the InferenceService and ServingRuntime
namespace: my-namespace              # Namespace to deploy into
uri: "oci://quay.io/myorg/my-model:1.0"  # Model storage URI (Quay OCI image)

# ServingRuntime name this InferenceService uses (default: same as modelname)
runtime: my-model

# Resources and tolerations are filled by the controller from this HardwareProfile.
hardwareProfileName: nvidia-l4-small

# Scale: set both to 0 to scale the model to zero (saves resources). Change in Git and sync to apply.
minReplicas: 1
maxReplicas: 1
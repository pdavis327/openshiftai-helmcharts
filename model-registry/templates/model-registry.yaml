apiVersion: modelregistry.opendatahub.io/v1beta1
kind: ModelRegistry
metadata:
  annotations:
    openshift.io/description: ''
    openshift.io/display-name: {{ .Release.Name }}
  name: {{ .Release.Name }}
  namespace: rhoai-model-registries
  finalizers:
    - modelregistry.opendatahub.io/finalizer
spec:
  grpc:
    port: 9090
  mysql:
    database: {{ .Values.mysql.database }}
    host: {{ .Release.Name }}.{{ .Release.Namespace }}.svc.cluster.local
    passwordSecret:
      key: database-password
      name: {{ .Release.Name }}-db
    port: 3306
    skipDBCreation: false
    username: {{ .Values.mysql.user }}
  oauthProxy:
    port: 8443
    routePort: 443
    serviceRoute: enabled
  rest:
    port: 8080
    serviceRoute: disabled
